---
name: 🦝 Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/analytical-platform-github-actions/.github/workflows/reusable-super-linter.yml@c1b4db7eb29e6b9599a9919c92a5182be2a03306 # v6.3.0
    with:
      super-linter-variables: |
        {
          "VALIDATE_LUA": "false"
        }
